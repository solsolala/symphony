replicaCount: 1

image:
  repository: symphony
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "symphony-orchestrator"

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

# Symphony specific config
env:
  - name: PORT
    value: "4000"
  - name: LINEAR_API_KEY
    value: ""
    # Or load from secret:
    # valueFrom:
    #   secretKeyRef:
    #     name: linear-secret
    #     key: api-key

workspaceRoot: "/app/workspaces"

worker:
  image:
    repository: symphony
    tag: "latest"
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
