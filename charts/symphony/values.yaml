replicaCount: 1

image:
  repository: symphony
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "symphony-orchestrator"

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

# Symphony specific config
tracker:
  kind: jira
  endpoint: ""
  projectSlug: ""
  apiKeyEnv: JIRA_API_TOKEN
  assigneeEnv: ""
  activeStates:
    - Todo
    - In Progress
  terminalStates:
    - Closed
    - Cancelled
    - Canceled
    - Duplicate
    - Done

repository:
  cloneUrl: ""
  ref: "main"

codex:
  command: "codex app-server"

runtimeServer:
  host: "0.0.0.0"
  port: 4000

env:
  - name: PORT
    value: "4000"
  - name: JIRA_API_TOKEN
    value: ""
    # Or point tracker.apiKeyEnv at another env var.
    # Prefer loading from a secret:
    # valueFrom:
    #   secretKeyRef:
    #     name: jira-secret
    #     key: api-key
  - name: OPENAI_API_KEY
    value: ""
    # Worker pods inherit OPENAI_API_KEY by default and need it for real Codex turns.
    # Prefer loading from a secret in non-local environments.

workspaceRoot: "/app/workspaces"

worker:
  image:
    repository: symphony
    tag: "latest"
    pullPolicy: IfNotPresent
  inheritEnv:
    - JIRA_API_TOKEN
    - OPENAI_API_KEY
    - OPENAI_BASE_URL
    - OPENAI_ORG_ID
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
