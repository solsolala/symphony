apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "symphony.fullname" . }}-config
  labels:
    {{- include "symphony.labels" . | nindent 4 }}
data:
  WORKFLOW.md: |
    ---
    tracker:
      kind: {{ .Values.tracker.kind | quote }}
      {{- with .Values.tracker.endpoint }}
      endpoint: {{ . | quote }}
      {{- end }}
      project_slug: {{ .Values.tracker.projectSlug | quote }}
      {{- with .Values.tracker.apiKeyEnv }}
      api_key: {{ printf "$%s" . | quote }}
      {{- end }}
      {{- with .Values.tracker.assigneeEnv }}
      assignee: {{ printf "$%s" . | quote }}
      {{- end }}
      active_states:
        {{- toYaml .Values.tracker.activeStates | nindent 8 }}
      terminal_states:
        {{- toYaml .Values.tracker.terminalStates | nindent 8 }}
    workspace:
      root: {{ .Values.workspaceRoot }}
    agent:
      max_concurrent_agents: 10
      max_turns: 20
    codex:
      command: {{ .Values.codex.command | quote }}
    {{- with .Values.repository.cloneUrl }}
    hooks:
      after_create: |
        REPO_URL={{ . | quote }}
        REPO_HOST=$(printf '%s' "$REPO_URL" | sed -E 's#^[a-z]+://([^/@]+@)?([^/:]+).*$#\2#')
        GITHUB_HOST=$(printf '%s' "${GITHUB_SERVER_URL:-}" | sed -E 's#^https?://([^/]+).*$#\1#')
        if [ -n "${GITHUB_TOKEN:-}" ] && [ -n "$REPO_HOST" ] && [ "$REPO_HOST" = "$GITHUB_HOST" ]; then
          AUTH_HEADER=$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')
          git -c "http.https://$REPO_HOST/.extraheader=AUTHORIZATION: basic $AUTH_HEADER" clone --depth 1{{- with $.Values.repository.ref }} --branch {{ . | quote }}{{- end }} "$REPO_URL" .
        else
          git clone --depth 1{{- with $.Values.repository.ref }} --branch {{ . | quote }}{{- end }} "$REPO_URL" .
        fi
    {{- end }}
    server:
      host: {{ .Values.runtimeServer.host | quote }}
      port: {{ .Values.runtimeServer.port }}
    ---

    You are working on a {{ .Values.tracker.kind }} issue {{ "{{" }} issue.identifier {{ "}}" }}.

    Title: {{ "{{" }} issue.title {{ "}}" }}
    Body: {{ "{{" }} issue.description {{ "}}" }}
